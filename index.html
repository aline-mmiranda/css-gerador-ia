<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>CSS Gerador com IA</title>
</head>

<body>
    <h1>
        CSS Gerador <span>com IA</span>⚡️
    </h1>

    <p>
        Descreva o que você imagina e veja a mágica acontecer
    </p>

    <input class="key-API" placeholder="Groq API key">

    <textarea rows="2" class="text-box" placeholder="Ex: Bola azul pingando"></textarea>

    <button class="btn-generate">Gerar Código ⚡️</button>

    <p class="error-msg"></p>
    
    <div class="result-box">
        <div>
            <h2>Código</h2>
            <p class="code-box"></p>
        </div>
        <div>
            <h2>Preview</h2>
            <iframe class="code-result"></iframe>
        </div>
    </div>

</body>

<script src="./src/scripts.js"></script>


</html>
